<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoRig — Digitiser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
    --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0f0;
    --muted: #666; --success: #47ffb2; --scan-green: #00ff88;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.3s, transform 0.3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* SETUP */
  #setup { padding: 40px 28px 32px; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
  .setup-hero { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .setup-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(36px,10vw,52px); line-height: 1; }
  .setup-title span { color: var(--accent); }
  .setup-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-top: 8px; }
  .settings-grid { display: grid; gap: 2px; margin: 24px 0; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); }
  .setting-row:first-child { border-radius: 10px 10px 0 0; }
  .setting-row:last-child { border-radius: 0 0 10px 10px; }
  .setting-label { font-size: 11px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
  .setting-val { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
  .stepper { display: flex; align-items: center; gap: 10px; }
  .step-btn { width: 28px; height: 28px; background: var(--border); border: none; border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .step-btn:active { background: var(--accent); color: var(--bg); }
  .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; border: none; }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: var(--muted); top: 3px; left: 3px; transition: transform 0.2s, background 0.2s; }
  .toggle.on { background: color-mix(in srgb, var(--accent) 25%, transparent); }
  .toggle.on::after { transform: translateX(20px); background: var(--accent); }
  .start-btn { width: 100%; padding: 18px; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.15s; }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .cv-status { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; letter-spacing: 0.05em; min-height: 16px; transition: opacity 1s; }

  /* CAMERA */
  #camera { background: #000; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #overlay-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent,var(--scan-green),transparent); opacity: 0; pointer-events: none; }
  #scan-line.active { opacity: 1; animation: scanline 0.8s ease-in-out forwards; }
  @keyframes scanline { 0%{top:10%} 100%{top:90%} }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
  #flash.on { opacity: 0.7; }
  #hud { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 16px 28px; }
  .hud-top { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: all; }
  .hud-pill { background: rgba(13,13,13,0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 11px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.watching { background: var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.detected { background: var(--accent2); animation: pulse 0.4s infinite; }
  .status-dot.capturing { background: var(--success); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .count-badge { background: rgba(13,13,13,0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 11px; letter-spacing: 0.08em; }
  #scan-count { color: var(--accent); font-weight: 500; }
  .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: all; }
  .cam-btn { width: 48px; height: 48px; background: rgba(13,13,13,0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 50%; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cam-btn:active { background: rgba(232,255,71,0.15); border-color: var(--accent); }
  #motion-meter { position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%); width: 120px; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
  .meter-label { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); }
  .meter-track { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  #meter-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.1s, background 0.1s; }

  /* GALLERY */
  #gallery-screen { background: var(--bg); overflow: hidden; }
  .gallery-header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .gallery-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
  .gallery-actions { display: flex; gap: 8px; }
  .g-btn { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: background 0.15s; }
  .g-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .g-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  #gallery-grid { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; -webkit-overflow-scrolling: touch; }
  .gallery-item { position: relative; aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; }
  .gallery-item:active { transform: scale(0.97); }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-num { position: absolute; bottom: 6px; left: 8px; font-size: 10px; color: rgba(255,255,255,0.6); }
  .item-dl { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; background: rgba(13,13,13,0.7); backdrop-filter: blur(4px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }
  .empty-state { grid-column: 1/-1; padding: 60px 20px; text-align: center; color: var(--muted); font-size: 12px; line-height: 2; }

  /* LIGHTBOX */
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #lightbox.show { opacity: 1; pointer-events: all; }
  #lightbox img { max-width: 100%; max-height: 80vh; border-radius: 8px; object-fit: contain; }
  .lb-actions { display: flex; gap: 12px; margin-top: 20px; }

  /* TOAST */
  #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 11px; letter-spacing: 0.08em; white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 200; display: flex; align-items: center; gap: 10px; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 0.8s infinite; }
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen" id="setup">
  <div class="logo">PhotoRig</div>
  <div class="setup-hero">
    <div class="setup-title">Drop.<br>Scan.<br><span>Done.</span></div>
    <p class="setup-sub">Auto-detect · Perspective correct · Enhance</p>
  </div>
  <div>
    <div class="settings-grid">
      <div class="setting-row">
        <span class="setting-label">Settle delay</span>
        <div class="setting-val">
          <div class="stepper">
            <button class="step-btn" onclick="adjustDelay(-100)">−</button>
            <span id="delay-val">0.8s</span>
            <button class="step-btn" onclick="adjustDelay(100)">+</button>
          </div>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sensitivity</span>
        <div class="setting-val">
          <div class="stepper">
            <button class="step-btn" onclick="adjustSens(-1)">−</button>
            <span id="sens-val">Med</span>
            <button class="step-btn" onclick="adjustSens(1)">+</button>
          </div>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Enhance photos</span>
        <div class="setting-val"><button class="toggle on" id="enhance-toggle" onclick="toggleEnhance()"></button></div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Perspective fix</span>
        <div class="setting-val"><button class="toggle on" id="persp-toggle" onclick="togglePersp()"></button></div>
      </div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startCamera()" disabled>Loading vision…</button>
    <p class="cv-status" id="cv-status">Loading OpenCV (~8MB, one-time)…</p>
  </div>
</div>

<!-- CAMERA -->
<div class="screen hidden" id="camera">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div id="scan-line"></div>
  <div id="flash"></div>
  <div id="motion-meter">
    <div class="meter-track"><div id="meter-fill"></div></div>
    <span class="meter-label">MOTION</span>
  </div>
  <div id="hud">
    <div class="hud-top">
      <div class="hud-pill">
        <div class="status-dot watching" id="status-dot"></div>
        <span id="status-text">WATCHING</span>
      </div>
      <div class="count-badge"><span id="scan-count">0</span> scanned</div>
    </div>
    <div class="hud-bottom">
      <button class="cam-btn" onclick="goBack()">←</button>
      <button class="cam-btn" onclick="showGallery()">▤</button>
      <button class="cam-btn" onclick="manualCapture()">◉</button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="screen hidden" id="gallery-screen">
  <div class="gallery-header">
    <span class="gallery-title">Gallery</span>
    <div class="gallery-actions">
      <button class="g-btn" onclick="downloadAll()">↓ All</button>
      <button class="g-btn" onclick="showCamera()">← Scan</button>
    </div>
  </div>
  <div id="gallery-grid"><div class="empty-state">No scans yet.<br>Drop a photo in the rig.</div></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="Scan">
  <div class="lb-actions" onclick="event.stopPropagation()">
    <button class="g-btn primary" onclick="downloadLightbox()">↓ Download</button>
    <button class="g-btn" onclick="closeLightbox()">Close</button>
  </div>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg">Processing…</span></div>

<script>var Module = { onRuntimeInitialized: function() { cvReady(); } };</script>
<script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let stream = null, animFrame = null, lastFrameData = null;
let motionTimer = null, captureInProgress = false;
let scanCount = 0, scans = [], lightboxIdx = -1;
let motionActive = false, stableFrames = 0;
let cvLoaded = false;
let settleDelay = 800, sensitivity = 2;
let doEnhance = true, doPersp = true;

const SENS_LABELS = ['Low','Med','High'];
const SENS_THRESH_RATIO = [0.12, 0.06, 0.03];
const SENS_PIXEL_DIFF = [40, 25, 15];
const ZONE_PAD_X = 0.08, ZONE_PAD_Y = 0.12;

// ═══════════════════════════════════════════════
// OPENCV READY
// ═══════════════════════════════════════════════
function cvReady() {
  cvLoaded = true;
  const btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.textContent = 'Start Scanning';
  const st = document.getElementById('cv-status');
  st.textContent = 'Vision ready ✓';
  setTimeout(() => { st.style.opacity = '0'; }, 2000);
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function adjustDelay(d) {
  settleDelay = Math.max(200, Math.min(3000, settleDelay + d));
  document.getElementById('delay-val').textContent = (settleDelay/1000).toFixed(1) + 's';
}
function adjustSens(d) {
  sensitivity = Math.max(1, Math.min(3, sensitivity + d));
  document.getElementById('sens-val').textContent = SENS_LABELS[sensitivity-1];
}
function toggleEnhance() { doEnhance = !doEnhance; document.getElementById('enhance-toggle').classList.toggle('on', doEnhance); }
function togglePersp() { doPersp = !doPersp; document.getElementById('persp-toggle').classList.toggle('on', doPersp); }

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    showScreen('camera');
    resizeOverlay();
    startMotionDetection();
    startOverlayLoop();
  } catch(e) {
    alert('Camera access denied. Please allow camera in your browser settings.');
  }
}

function stopCamera() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; animFrame = null; lastFrameData = null;
}

function resizeOverlay() {
  const c = document.getElementById('overlay-canvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener('resize', resizeOverlay);

// ═══════════════════════════════════════════════
// MOTION DETECTION
// ═══════════════════════════════════════════════
const motionCanvas = document.createElement('canvas');
const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
const SAMPLE = 96;

function startMotionDetection() {
  const video = document.getElementById('video');
  motionCanvas.width = SAMPLE; motionCanvas.height = SAMPLE;
  lastFrameData = null; motionActive = false; stableFrames = 0;
  let frameCount = 0;

  function tick() {
    if (!stream) return;
    animFrame = requestAnimationFrame(tick);
    if (video.readyState < 2 || captureInProgress) return;
    if (++frameCount % 3 !== 0) return;

    motionCtx.drawImage(video, 0, 0, SAMPLE, SAMPLE);
    const frame = motionCtx.getImageData(0, 0, SAMPLE, SAMPLE).data;
    if (!lastFrameData) { lastFrameData = new Uint8ClampedArray(frame); return; }

    const pixDiff = SENS_PIXEL_DIFF[sensitivity-1];
    const ratioThresh = SENS_THRESH_RATIO[sensitivity-1];
    let changed = 0;
    for (let i = 0; i < frame.length; i += 4) {
      const ln = 0.299*frame[i] + 0.587*frame[i+1] + 0.114*frame[i+2];
      const lo = 0.299*lastFrameData[i] + 0.587*lastFrameData[i+1] + 0.114*lastFrameData[i+2];
      if (Math.abs(ln - lo) > pixDiff) changed++;
    }
    const ratio = changed / (SAMPLE * SAMPLE);
    lastFrameData = new Uint8ClampedArray(frame);

    const fill = document.getElementById('meter-fill');
    fill.style.width = Math.min(100, Math.round(ratio * 400)) + '%';
    fill.style.background = ratio > ratioThresh ? 'var(--accent2)' : 'var(--accent)';

    if (ratio > ratioThresh) {
      stableFrames = 0;
      if (!motionActive) { motionActive = true; setStatus('detected', 'PLACING…'); }
      clearTimeout(motionTimer);
      motionTimer = setTimeout(() => {
        if (motionActive && !captureInProgress) { motionActive = false; triggerCapture(); }
      }, settleDelay);
    } else {
      stableFrames++;
      if (stableFrames > 10 && motionActive) {
        clearTimeout(motionTimer); motionActive = false;
        if (!captureInProgress) triggerCapture();
      }
    }
  }

  setStatus('watching', 'STARTING…');
  setTimeout(() => { setStatus('watching', 'WATCHING'); tick(); }, 1200);
}

// ═══════════════════════════════════════════════
// LIVE OVERLAY — shows detected quad outline
// ═══════════════════════════════════════════════
const detectCanvas = document.createElement('canvas');
const detectCtx = detectCanvas.getContext('2d', { willReadFrequently: true });

function startOverlayLoop() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay-canvas');
  const ctx = canvas.getContext('2d');
  let fc = 0;

  function draw() {
    if (!stream) return;
    requestAnimationFrame(draw);
    if (++fc % 8 !== 0) return; // ~7fps

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (captureInProgress || video.readyState < 2) return;

    const S = 320;
    detectCanvas.width = S; detectCanvas.height = S;
    detectCtx.drawImage(video, 0, 0, S, S);

    const quad = cvLoaded ? detectQuad(detectCanvas) : null;
    if (quad) {
      const sx = canvas.width / S, sy = canvas.height / S;
      drawQuadOverlay(ctx, quad.map(p => [p[0]*sx, p[1]*sy]));
    } else {
      drawZoneOverlay(ctx, canvas.width, canvas.height);
    }
  }
  draw();
}

function drawQuadOverlay(ctx, pts) {
  ctx.save();
  ctx.strokeStyle = '#e8ff47';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#e8ff47';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;
  pts.forEach(p => {
    ctx.fillStyle = '#e8ff47';
    ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawZoneOverlay(ctx, w, h) {
  const x = w*ZONE_PAD_X, y = h*ZONE_PAD_Y;
  const zw = w*(1-ZONE_PAD_X*2), zh = h*(1-ZONE_PAD_Y*2);
  ctx.save();
  ctx.strokeStyle = 'rgba(232,255,71,0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(x, y, zw, zh);
  ctx.restore();
}

// ═══════════════════════════════════════════════
// QUAD DETECTION (OpenCV.js)
// ═══════════════════════════════════════════════
function detectQuad(srcCanvas) {
  if (!cvLoaded || typeof cv === 'undefined') return null;
  let src, gray, blur, edges, contours, hier;
  try {
    src = cv.imread(srcCanvas);
    gray = new cv.Mat(); blur = new cv.Mat(); edges = new cv.Mat();
    contours = new cv.MatVector(); hier = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
    cv.Canny(blur, edges, 40, 120);

    const k = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3,3));
    cv.dilate(edges, edges, k); k.delete();

    cv.findContours(edges, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    const W = srcCanvas.width, H = srcCanvas.height;
    const minArea = W * H * 0.06;
    let bestQuad = null, bestArea = 0;

    for (let i = 0; i < contours.size(); i++) {
      const cnt = contours.get(i);
      const area = cv.contourArea(cnt);
      if (area < minArea) { cnt.delete(); continue; }

      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

      if (approx.rows === 4 && area > bestArea) {
        const pts = [];
        for (let j = 0; j < 4; j++) pts.push([approx.data32S[j*2], approx.data32S[j*2+1]]);
        const ordered = orderPoints(pts);
        if (ordered && isReasonableQuad(ordered, W, H)) {
          bestQuad = ordered;
          bestArea = area;
        }
      }
      approx.delete(); cnt.delete();
    }
    return bestQuad;
  } catch(e) {
    return null;
  } finally {
    [src, gray, blur, edges, contours, hier].forEach(m => { try { if(m) m.delete(); } catch(e){} });
  }
}

function orderPoints(pts) {
  const sorted = [...pts].sort((a,b) => a[1]-b[1]);
  const top = sorted.slice(0,2).sort((a,b) => a[0]-b[0]);
  const bot = sorted.slice(2).sort((a,b) => a[0]-b[0]);
  return [top[0], top[1], bot[1], bot[0]]; // TL, TR, BR, BL
}

function isReasonableQuad(pts, W, H) {
  const margin = 8;
  for (const p of pts) {
    if (p[0] < margin || p[0] > W-margin || p[1] < margin || p[1] > H-margin) return false;
  }
  const w = Math.hypot(pts[1][0]-pts[0][0], pts[1][1]-pts[0][1]);
  const h = Math.hypot(pts[3][0]-pts[0][0], pts[3][1]-pts[0][1]);
  if (w < 20 || h < 20) return false;
  const ar = w / h;
  return ar > 0.3 && ar < 3.5;
}

// ═══════════════════════════════════════════════
// PERSPECTIVE WARP (OpenCV.js)
// ═══════════════════════════════════════════════
function perspectiveWarp(srcCanvas, quadPts) {
  if (!cvLoaded || typeof cv === 'undefined') return srcCanvas;
  let src, dst, srcM, dstM, M;
  try {
    src = cv.imread(srcCanvas);
    const [tl, tr, br, bl] = quadPts;
    const wTop = Math.hypot(tr[0]-tl[0], tr[1]-tl[1]);
    const wBot = Math.hypot(br[0]-bl[0], br[1]-bl[1]);
    const hL   = Math.hypot(bl[0]-tl[0], bl[1]-tl[1]);
    const hR   = Math.hypot(br[0]-tr[0], br[1]-tr[1]);
    const outW = Math.round(Math.max(wTop, wBot));
    const outH = Math.round(Math.max(hL, hR));

    if (outW < 80 || outH < 80) return srcCanvas;

    srcM = cv.matFromArray(4, 1, cv.CV_32FC2, [tl[0],tl[1], tr[0],tr[1], br[0],br[1], bl[0],bl[1]]);
    dstM = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, outW-1,0, outW-1,outH-1, 0,outH-1]);
    M = cv.getPerspectiveTransform(srcM, dstM);
    dst = new cv.Mat();
    cv.warpPerspective(src, dst, M, new cv.Size(outW, outH), cv.INTER_LINEAR, cv.BORDER_REPLICATE);

    const out = document.createElement('canvas');
    out.width = outW; out.height = outH;
    cv.imshow(out, dst);
    return out;
  } catch(e) {
    return srcCanvas;
  } finally {
    [src, dst, srcM, dstM, M].forEach(m => { try { if(m) m.delete(); } catch(e){} });
  }
}

// ═══════════════════════════════════════════════
// CAPTURE
// ═══════════════════════════════════════════════
function triggerCapture() {
  if (captureInProgress) return;
  captureInProgress = true;
  setStatus('capturing', 'CAPTURING');

  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 150);

  const sl = document.getElementById('scan-line');
  sl.style.top = '10%'; sl.classList.add('active');
  setTimeout(() => sl.classList.remove('active'), 900);

  const video = document.getElementById('video');
  requestAnimationFrame(() => {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { captureInProgress = false; setStatus('watching','WATCHING'); return; }

    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = vw; fullCanvas.height = vh;
    fullCanvas.getContext('2d').drawImage(video, 0, 0, vw, vh);

    showToast('Detecting edges…');

    setTimeout(() => {
      let result = fullCanvas;

      if (doPersp && cvLoaded) {
        showToast('Detecting edges…');
        const quad = detectQuad(fullCanvas);
        if (quad) {
          showToast('Correcting perspective…');
          result = perspectiveWarp(fullCanvas, quad);
        } else {
          // No quad found — fall back to zone crop
          result = zoneCrop(fullCanvas, video);
        }
      } else {
        result = zoneCrop(fullCanvas, video);
      }

      if (doEnhance) {
        showToast('Enhancing…');
        result = enhanceImage(result);
      }

      const dataUrl = result.toDataURL('image/jpeg', 0.93);
      addScan(dataUrl);
      hideToast();
      setTimeout(() => {
        captureInProgress = false;
        setStatus('watching', 'WATCHING');
      }, 2000);
    }, 40);
  });
}

function zoneCrop(fullCanvas, video) {
  const vw = fullCanvas.width, vh = fullCanvas.height;
  const dw = video.clientWidth, dh = video.clientHeight;
  const scale = Math.max(vw/dw, vh/dh);
  const offX = (vw - dw*scale) / 2, offY = (vh - dh*scale) / 2;
  const sx = Math.max(0, Math.round(offX + dw*ZONE_PAD_X*scale));
  const sy = Math.max(0, Math.round(offY + dh*ZONE_PAD_Y*scale));
  const sw = Math.min(Math.round(dw*(1-ZONE_PAD_X*2)*scale), vw-sx);
  const sh = Math.min(Math.round(dh*(1-ZONE_PAD_Y*2)*scale), vh-sy);
  const out = document.createElement('canvas');
  out.width = sw; out.height = sh;
  out.getContext('2d').drawImage(fullCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
  return out;
}

function manualCapture() {
  if (captureInProgress) return;
  clearTimeout(motionTimer); motionActive = false;
  triggerCapture();
}

// ═══════════════════════════════════════════════
// IMAGE ENHANCEMENT
// ═══════════════════════════════════════════════
function enhanceImage(srcCanvas) {
  const w = srcCanvas.width, h = srcCanvas.height;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0);
  const img = ctx.getImageData(0, 0, w, h);
  let d = new Uint8ClampedArray(img.data);
  d = removeGlare(d, w, h);
  d = whiteBalance(d, w, h);
  d = contrastStretch(d, w, h, 1.5);
  d = unsharpMask(d, w, h, 0.5);
  d = gammaCorrect(d, 0.85);
  img.data.set(d);
  ctx.putImageData(img, 0, 0);
  return out;
}

function removeGlare(d, w, h) {
  const out = new Uint8ClampedArray(d), T=235, R=12, S=3;
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    const i=(y*w+x)*4;
    if (d[i]>T&&d[i+1]>T&&d[i+2]>T) {
      let sr=0,sg=0,sb=0,n=0;
      for (let ny=Math.max(0,y-R);ny<=Math.min(h-1,y+R);ny+=S)
        for (let nx=Math.max(0,x-R);nx<=Math.min(w-1,x+R);nx+=S) {
          const ni=(ny*w+nx)*4;
          if (d[ni]<=T||d[ni+1]<=T||d[ni+2]<=T){sr+=d[ni];sg+=d[ni+1];sb+=d[ni+2];n++;}
        }
      if (n>=4){out[i]=Math.round(sr/n*.85+d[i]*.15);out[i+1]=Math.round(sg/n*.85+d[i+1]*.15);out[i+2]=Math.round(sb/n*.85+d[i+2]*.15);}
      else{const l=Math.round((d[i]*.299+d[i+1]*.587+d[i+2]*.114)*.8);out[i]=out[i+1]=out[i+2]=l;}
    }
  }
  return out;
}

function whiteBalance(d,w,h) {
  let rS=0,gS=0,bS=0;const n=w*h;
  for(let i=0;i<d.length;i+=4){rS+=d[i];gS+=d[i+1];bS+=d[i+2];}
  const avg=(rS+gS+bS)/(n*3),rs=avg/(rS/n),gs=avg/(gS/n),bs=avg/(bS/n);
  const out=new Uint8ClampedArray(d);
  for(let i=0;i<d.length;i+=4){out[i]=Math.min(255,Math.round(d[i]*rs));out[i+1]=Math.min(255,Math.round(d[i+1]*gs));out[i+2]=Math.min(255,Math.round(d[i+2]*bs));}
  return out;
}

function contrastStretch(d,w,h,pct=1.0) {
  const out=new Uint8ClampedArray(d),total=w*h,clip=Math.round(total*pct/100);
  for(let ch=0;ch<3;ch++){
    const hist=new Int32Array(256);
    for(let i=ch;i<d.length;i+=4)hist[d[i]]++;
    let lo=0,hi=255,acc=0;
    for(let v=0;v<256;v++){acc+=hist[v];if(acc>clip){lo=v;break;}}acc=0;
    for(let v=255;v>=0;v--){acc+=hist[v];if(acc>clip){hi=v;break;}}
    if(hi<=lo)continue;
    const sc=255/(hi-lo);
    for(let i=ch;i<d.length;i+=4)out[i]=Math.min(255,Math.max(0,Math.round((d[i]-lo)*sc)));
  }
  return out;
}

function unsharpMask(d,w,h,str=0.4) {
  const out=new Uint8ClampedArray(d),c=1+str*8,s=-str,k=[s,s,s,s,c,s,s,s,s];
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const idx=(y*w+x)*4;
    for(let ch=0;ch<3;ch++){
      let sum=0;
      for(let ky=-1;ky<=1;ky++) for(let kx=-1;kx<=1;kx++) sum+=d[((y+ky)*w+(x+kx))*4+ch]*k[(ky+1)*3+(kx+1)];
      out[idx+ch]=Math.min(255,Math.max(0,Math.round(sum)));
    }
  }
  return out;
}

function gammaCorrect(d,g) {
  const lut=new Uint8ClampedArray(256);
  for(let i=0;i<256;i++)lut[i]=Math.round(Math.pow(i/255,g)*255);
  const out=new Uint8ClampedArray(d);
  for(let i=0;i<d.length;i+=4){out[i]=lut[d[i]];out[i+1]=lut[d[i+1]];out[i+2]=lut[d[i+2]];out[i+3]=d[i+3];}
  return out;
}

// ═══════════════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════════════
function addScan(dataUrl) {
  scanCount++; scans.push({dataUrl, ts: Date.now()});
  document.getElementById('scan-count').textContent = scanCount;
  const badge = document.querySelector('.count-badge');
  badge.style.borderColor = 'var(--success)';
  setTimeout(() => badge.style.borderColor = '', 600);
}

function showGallery() { renderGallery(); showScreen('gallery-screen'); }

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (!scans.length) { grid.innerHTML = '<div class="empty-state">No scans yet.<br>Drop a photo in the rig.</div>'; return; }
  grid.innerHTML = scans.map((s,i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${s.dataUrl}" loading="lazy">
      <span class="item-num">#${String(i+1).padStart(3,'0')}</span>
      <span class="item-dl" onclick="event.stopPropagation();downloadSingle(${i})">↓</span>
    </div>`).join('');
}

function openLightbox(i) { lightboxIdx=i; document.getElementById('lb-img').src=scans[i].dataUrl; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function downloadLightbox() { if (lightboxIdx>=0) downloadSingle(lightboxIdx); }
function downloadSingle(i) { const a=document.createElement('a'); a.href=scans[i].dataUrl; a.download=`scan-${String(i+1).padStart(3,'0')}.jpg`; a.click(); }
function downloadAll() { scans.forEach((s,i) => setTimeout(()=>downloadSingle(i),i*200)); }

// ═══════════════════════════════════════════════
// NAVIGATION / STATUS / TOAST
// ═══════════════════════════════════════════════
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id!==id)); }
function showCamera() { showScreen('camera'); }
function goBack() { stopCamera(); showScreen('setup'); }
function setStatus(state, label) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = label;
}
let toastTimer;
function showToast(msg) { clearTimeout(toastTimer); document.getElementById('toast-msg').textContent=msg; document.getElementById('toast').classList.add('show'); }
function hideToast() { toastTimer=setTimeout(()=>document.getElementById('toast').classList.remove('show'),800); }
</script>
