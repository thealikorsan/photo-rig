<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoRig — Digitiser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --success: #47ffb2;
    --danger: #ff4757;
    --scan-green: #00ff88;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.3s, transform 0.3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── SETUP SCREEN ── */
  #setup {
    padding: 40px 28px 32px;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .setup-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .setup-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 10vw, 52px);
    line-height: 1;
    color: var(--text);
  }
  .setup-title span { color: var(--accent); }

  .setup-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  .settings-grid {
    display: grid;
    gap: 2px;
    margin: 24px 0;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .setting-row:first-child { border-radius: 10px 10px 0 0; }
  .setting-row:last-child { border-radius: 0 0 10px 10px; }
  .setting-row:only-child { border-radius: 10px; }

  .setting-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .setting-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stepper { display: flex; align-items: center; gap: 10px; }
  .step-btn {
    width: 28px; height: 28px;
    background: var(--border);
    border: none;
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .step-btn:active { background: var(--accent); color: var(--bg); }

  .toggle {
    width: 44px; height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--muted);
    top: 3px; left: 3px;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on { background: color-mix(in srgb, var(--accent) 25%, transparent); }
  .toggle.on::after { transform: translateX(20px); background: var(--accent); }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .start-btn:active { opacity: 0.85; transform: scale(0.99); }

  /* ── CAMERA SCREEN ── */
  #camera { background: #000; }

  #video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* scan overlay */
  #scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .zone-rect {
    position: absolute;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }

  /* corner marks */
  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* scan line */
  #scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--scan-green), transparent);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #scan-line.active { opacity: 1; animation: scanline 0.8s ease-in-out; }
  @keyframes scanline {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  /* HUD */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px 16px 28px;
  }

  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: all;
  }

  .hud-pill {
    background: rgba(13,13,13,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.watching { background: var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.detected { background: var(--accent2); animation: pulse 0.4s infinite; }
  .status-dot.capturing { background: var(--success); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  #status-text { color: var(--text); }

  .count-badge {
    background: rgba(13,13,13,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  #scan-count { color: var(--accent); font-weight: 500; }

  /* motion meter */
  #motion-meter {
    position: absolute;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }
  .meter-label { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); }
  .meter-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #meter-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s, background 0.1s;
  }

  .hud-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: all;
  }

  .cam-btn {
    width: 48px; height: 48px;
    background: rgba(13,13,13,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .cam-btn:active { background: rgba(232,255,71,0.15); border-color: var(--accent); }

  /* flash overlay */
  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }
  #flash.on { opacity: 0.7; }

  /* countdown ring */
  #countdown-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #countdown-wrap.show { opacity: 1; }
  #countdown-num {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(232,255,71,0.5);
  }

  /* ── GALLERY SCREEN ── */
  #gallery {
    background: var(--bg);
    overflow: hidden;
  }

  .gallery-header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .gallery-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .gallery-actions {
    display: flex;
    gap: 8px;
  }

  .g-btn {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .g-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .g-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  #gallery-grid {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .gallery-item:active { transform: scale(0.97); }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .item-num {
    position: absolute;
    bottom: 6px; left: 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.05em;
  }

  .item-dl {
    position: absolute;
    top: 6px; right: 6px;
    width: 28px; height: 28px;
    background: rgba(13,13,13,0.7);
    backdrop-filter: blur(4px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }

  .empty-state {
    grid-column: 1 / -1;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #lightbox.show { opacity: 1; pointer-events: all; }
  #lightbox img {
    max-width: 100%; max-height: 80vh;
    border-radius: 8px;
    object-fit: contain;
  }
  .lb-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  /* ── PROCESSING TOAST ── */
  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 0.08em;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 0.8s infinite; }

  /* hidden processing canvas */
  #proc-canvas { display: none; }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div class="screen" id="setup">
  <div class="logo">PhotoRig</div>

  <div class="setup-hero">
    <div class="setup-title">Drop.<br>Scan.<br><span>Done.</span></div>
    <p class="setup-sub">Place print → auto-capture → auto-enhance</p>
  </div>

  <div>
    <div class="settings-grid">
      <div class="setting-row">
        <span class="setting-label">Settle delay</span>
        <div class="setting-val">
          <div class="stepper">
            <button class="step-btn" onclick="adjustDelay(-100)">−</button>
            <span id="delay-val">0.8s</span>
            <button class="step-btn" onclick="adjustDelay(100)">+</button>
          </div>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sensitivity</span>
        <div class="setting-val">
          <div class="stepper">
            <button class="step-btn" onclick="adjustSens(-1)">−</button>
            <span id="sens-val">Med</span>
            <button class="step-btn" onclick="adjustSens(1)">+</button>
          </div>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Enhance photos</span>
        <div class="setting-val">
          <button class="toggle on" id="enhance-toggle" onclick="toggleEnhance()"></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Glare removal</span>
        <div class="setting-val">
          <button class="toggle on" id="glare-toggle" onclick="toggleGlare()"></button>
        </div>
      </div>
    </div>

    <button class="start-btn" onclick="startCamera()">Start Scanning</button>
  </div>
</div>

<!-- ══ CAMERA SCREEN ══ -->
<div class="screen hidden" id="camera">
  <video id="video" autoplay playsinline muted></video>

  <!-- Zone rectangle with corners -->
  <div id="scan-overlay">
    <div class="zone-rect" id="zone-rect">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>

  <div id="scan-line"></div>
  <div id="flash"></div>
  <div id="countdown-wrap"><span id="countdown-num">3</span></div>

  <div id="motion-meter">
    <div class="meter-track"><div id="meter-fill"></div></div>
    <span class="meter-label">MOTION</span>
  </div>

  <div id="hud">
    <div class="hud-top">
      <div class="hud-pill">
        <div class="status-dot watching" id="status-dot"></div>
        <span id="status-text">WATCHING</span>
      </div>
      <div class="count-badge"><span id="scan-count">0</span> scanned</div>
    </div>
    <div class="hud-bottom">
      <button class="cam-btn" onclick="goBack()" title="Back">←</button>
      <button class="cam-btn" onclick="showGallery()" title="Gallery">▤</button>
      <button class="cam-btn" onclick="manualCapture()" title="Manual capture">◉</button>
    </div>
  </div>
</div>

<!-- ══ GALLERY SCREEN ══ -->
<div class="screen hidden" id="gallery-screen">
  <div class="gallery-header">
    <span class="gallery-title">Gallery</span>
    <div class="gallery-actions">
      <button class="g-btn" onclick="downloadAll()">↓ All</button>
      <button class="g-btn" onclick="showCamera()">← Scan</button>
    </div>
  </div>
  <div id="gallery-grid">
    <div class="empty-state">No scans yet.<br>Drop a photo in the rig<br>to get started.</div>
  </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="Scanned photo">
  <div class="lb-actions" onclick="event.stopPropagation()">
    <button class="g-btn primary" id="lb-dl" onclick="downloadLightbox()">↓ Download</button>
    <button class="g-btn" onclick="closeLightbox()">Close</button>
  </div>
</div>

<!-- processing canvas (hidden) -->
<canvas id="proc-canvas"></canvas>

<!-- toast -->
<div id="toast"><div class="toast-dot"></div><span id="toast-msg">Processing…</span></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let stream = null;
let animFrame = null;
let lastFrameData = null;
let motionTimer = null;
let captureInProgress = false;
let scanCount = 0;
let scans = []; // {dataUrl, timestamp}
let lightboxIdx = -1;
let motionActive = false;   // true while we think something is being placed
let stableFrames = 0;       // consecutive stable frames after motion

// Settings
let settleDelay = 800;   // ms
let sensitivity = 2;     // 1=low 2=med 3=high
let doEnhance = true;
let doGlare = true;

const SENS_LABELS = ['Low','Med','High'];
// % of pixels that must change to count as "motion"
const SENS_THRESH_RATIO = [0.12, 0.06, 0.03];
// per-pixel brightness diff to count as changed
const SENS_PIXEL_DIFF = [40, 25, 15];

// Zone: centre of screen (display coordinates, recalculated on resize)
const ZONE_PAD_X = 0.08;
const ZONE_PAD_Y = 0.12;

// ═══════════════════════════════════════════════════════
// SETTINGS UI
// ═══════════════════════════════════════════════════════
function adjustDelay(delta) {
  settleDelay = Math.max(200, Math.min(3000, settleDelay + delta));
  document.getElementById('delay-val').textContent = (settleDelay/1000).toFixed(1) + 's';
}
function adjustSens(delta) {
  sensitivity = Math.max(1, Math.min(3, sensitivity + delta));
  document.getElementById('sens-val').textContent = SENS_LABELS[sensitivity-1];
}
function toggleEnhance() {
  doEnhance = !doEnhance;
  document.getElementById('enhance-toggle').classList.toggle('on', doEnhance);
}
function toggleGlare() {
  doGlare = !doGlare;
  document.getElementById('glare-toggle').classList.toggle('on', doGlare);
}

// ═══════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    showScreen('camera');
    positionZone();
    startMotionDetection();
  } catch(e) {
    alert('Camera access denied. Please allow camera in your browser settings.');
  }
}

function positionZone() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const zx = vw * ZONE_PAD_X, zy = vh * ZONE_PAD_Y;
  const zw = vw * (1 - ZONE_PAD_X*2), zh = vh * (1 - ZONE_PAD_Y*2);
  const z = document.getElementById('zone-rect');
  z.style.left = zx + 'px';
  z.style.top = zy + 'px';
  z.style.width = zw + 'px';
  z.style.height = zh + 'px';
}

function stopCamera() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; animFrame = null; lastFrameData = null;
}

// ═══════════════════════════════════════════════════════
// MOTION DETECTION
// ═══════════════════════════════════════════════════════
const motionCanvas = document.createElement('canvas');
const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
const SAMPLE = 96; // sample resolution for motion diff

function startMotionDetection() {
  const video = document.getElementById('video');
  motionCanvas.width = SAMPLE;
  motionCanvas.height = SAMPLE;
  lastFrameData = null;
  motionActive = false;
  stableFrames = 0;

  let frameCount = 0;
  function tick() {
    if (!stream) return;
    animFrame = requestAnimationFrame(tick);
    if (video.readyState < 2 || captureInProgress) return;

    // Sample every 3rd frame for performance
    frameCount++;
    if (frameCount % 3 !== 0) return;

    motionCtx.drawImage(video, 0, 0, SAMPLE, SAMPLE);
    const frame = motionCtx.getImageData(0, 0, SAMPLE, SAMPLE).data;

    if (!lastFrameData) {
      lastFrameData = new Uint8ClampedArray(frame);
      return;
    }

    const pixDiff = SENS_PIXEL_DIFF[sensitivity - 1];
    const ratioThresh = SENS_THRESH_RATIO[sensitivity - 1];
    let changedPixels = 0;
    const totalPixels = SAMPLE * SAMPLE;

    for (let i = 0; i < frame.length; i += 4) {
      // Use luminance diff (faster than per-channel)
      const lumNew = 0.299 * frame[i] + 0.587 * frame[i+1] + 0.114 * frame[i+2];
      const lumOld = 0.299 * lastFrameData[i] + 0.587 * lastFrameData[i+1] + 0.114 * lastFrameData[i+2];
      if (Math.abs(lumNew - lumOld) > pixDiff) changedPixels++;
    }

    const changeRatio = changedPixels / totalPixels;
    lastFrameData = new Uint8ClampedArray(frame);

    // Update motion meter UI
    const meterFill = document.getElementById('meter-fill');
    const meterPct = Math.min(100, Math.round(changeRatio * 400));
    meterFill.style.width = meterPct + '%';
    meterFill.style.background = changeRatio > ratioThresh ? 'var(--accent2)' : 'var(--accent)';

    if (changeRatio > ratioThresh) {
      // Scene is changing — photo being placed
      stableFrames = 0;
      if (!motionActive) {
        motionActive = true;
        clearTimeout(motionTimer);
        setStatus('detected', 'PLACING…');
      }
      // Reset settle timer every time motion is seen
      clearTimeout(motionTimer);
      motionTimer = setTimeout(() => {
        // settleDelay ms of no motion — capture now
        if (motionActive && !captureInProgress) {
          motionActive = false;
          triggerCapture();
        }
      }, settleDelay);
    } else {
      // Stable frame
      stableFrames++;
      if (stableFrames > 10 && motionActive) {
        // Extra-stable — fire sooner
        clearTimeout(motionTimer);
        motionActive = false;
        if (!captureInProgress) triggerCapture();
      }
    }
  }

  // Warm up — collect a baseline for 1 second before watching
  setStatus('watching', 'STARTING…');
  setTimeout(() => {
    setStatus('watching', 'WATCHING');
    tick();
  }, 1200);
}

// ═══════════════════════════════════════════════════════
// CAPTURE
// ═══════════════════════════════════════════════════════
function triggerCapture() {
  if (captureInProgress) return;
  captureInProgress = true;
  setStatus('capturing', 'CAPTURING');

  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 150);

  // Animate scan line through the zone
  const sl = document.getElementById('scan-line');
  const zr = document.getElementById('zone-rect');
  sl.style.top = zr.style.top;
  sl.classList.add('active');
  setTimeout(() => sl.classList.remove('active'), 900);

  const video = document.getElementById('video');

  // Wait one frame to ensure video frame is fresh
  requestAnimationFrame(() => {
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (!vw || !vh) {
      captureInProgress = false;
      setStatus('watching', 'WATCHING');
      return;
    }

    // Capture full video frame
    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = vw;
    fullCanvas.height = vh;
    const fctx = fullCanvas.getContext('2d');
    fctx.drawImage(video, 0, 0, vw, vh);

    // The video element fills the screen with object-fit:cover.
    // We need to map screen zone coords → actual video pixel coords.
    const displayW = video.clientWidth;
    const displayH = video.clientHeight;

    // Scale factor: how much of the video is visible on screen
    const scaleX = vw / displayW;
    const scaleY = vh / displayH;

    // When object-fit:cover, one axis is cropped. Use the larger scale.
    const scale = Math.max(scaleX, scaleY);

    // Offset (video pixels that are hidden off-screen)
    const offX = (vw - displayW * scale) / 2;
    const offY = (vh - displayH * scale) / 2;

    // Zone in display pixels
    const zoneDisplayX = displayW * ZONE_PAD_X;
    const zoneDisplayY = displayH * ZONE_PAD_Y;
    const zoneDisplayW = displayW * (1 - ZONE_PAD_X * 2);
    const zoneDisplayH = displayH * (1 - ZONE_PAD_Y * 2);

    // Convert to video pixels
    const cropX = Math.round(offX + zoneDisplayX * scale);
    const cropY = Math.round(offY + zoneDisplayY * scale);
    const cropW = Math.round(zoneDisplayW * scale);
    const cropH = Math.round(zoneDisplayH * scale);

    // Clamp to video bounds
    const sx = Math.max(0, cropX);
    const sy = Math.max(0, cropY);
    const sw = Math.min(cropW, vw - sx);
    const sh = Math.min(cropH, vh - sy);

    // Crop canvas
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = sw;
    cropCanvas.height = sh;
    const cctx = cropCanvas.getContext('2d');
    cctx.drawImage(fullCanvas, sx, sy, sw, sh, 0, 0, sw, sh);

    showToast('Enhancing…');

    // Use setTimeout so toast renders before heavy processing
    setTimeout(() => {
      let result = cropCanvas;
      if (doEnhance || doGlare) {
        result = enhanceImage(cropCanvas, doEnhance, doGlare);
      }
      const dataUrl = result.toDataURL('image/jpeg', 0.93);
      addScan(dataUrl);
      hideToast();
      // Cool-down: ignore motion for 2s after capture
      setTimeout(() => {
        captureInProgress = false;
        setStatus('watching', 'WATCHING');
      }, 2000);
    }, 30);
  });
}

function manualCapture() {
  if (captureInProgress) return;
  clearTimeout(motionTimer);
  triggerCapture();
}

// ═══════════════════════════════════════════════════════
// IMAGE ENHANCEMENT PIPELINE
// ═══════════════════════════════════════════════════════
function enhanceImage(srcCanvas, enhance, glare) {
  const w = srcCanvas.width, h = srcCanvas.height;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0);

  const img = ctx.getImageData(0, 0, w, h);
  let d = new Uint8ClampedArray(img.data);

  // 1. GLARE REMOVAL — tone down blown highlights using local neighbourhood
  if (glare) d = removeGlare(d, w, h);

  // 2. WHITE BALANCE — grey-world: neutralise colour cast from room lighting
  if (enhance) d = whiteBalance(d, w, h);

  // 3. CONTRAST STRETCH — clip 1.5% tails per channel for punchier output
  if (enhance) d = contrastStretch(d, w, h, 1.5);

  // 4. SHARPENING — unsharp mask, strength 0.5
  if (enhance) d = unsharpMask(d, w, h, 0.5);

  // 5. GAMMA — gentle brightening (0.85 = slight lift of mids)
  if (enhance) d = gammaCorrect(d, 0.85);

  img.data.set(d);
  ctx.putImageData(img, 0, 0);
  return out;
}

// ── Glare removal ──
// Detects over-exposed pixels and fills them with neighbourhood average
function removeGlare(d, w, h) {
  const out = new Uint8ClampedArray(d);
  const THRESH = 235;   // pixels above this on all channels = glare
  const RADIUS = 12;    // neighbourhood sample radius
  const STEP = 3;       // sparse sampling step

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i] > THRESH && d[i+1] > THRESH && d[i+2] > THRESH) {
        let sr = 0, sg = 0, sb = 0, n = 0;
        const y0 = Math.max(0, y - RADIUS), y1 = Math.min(h - 1, y + RADIUS);
        const x0 = Math.max(0, x - RADIUS), x1 = Math.min(w - 1, x + RADIUS);
        for (let ny = y0; ny <= y1; ny += STEP) {
          for (let nx = x0; nx <= x1; nx += STEP) {
            const ni = (ny * w + nx) * 4;
            // Only use non-glare neighbours
            if (d[ni] <= THRESH || d[ni+1] <= THRESH || d[ni+2] <= THRESH) {
              sr += d[ni]; sg += d[ni+1]; sb += d[ni+2]; n++;
            }
          }
        }
        if (n >= 4) {
          // Blend neighbourhood colour in strongly (85%)
          out[i]   = Math.round(sr/n * 0.85 + d[i]   * 0.15);
          out[i+1] = Math.round(sg/n * 0.85 + d[i+1] * 0.15);
          out[i+2] = Math.round(sb/n * 0.85 + d[i+2] * 0.15);
        } else {
          // No good neighbours — desaturate and dim
          const lum = Math.round((d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) * 0.8);
          out[i] = out[i+1] = out[i+2] = lum;
        }
      }
    }
  }
  return out;
}

// ── White balance (grey world) ──
function whiteBalance(d, w, h) {
  let rSum = 0, gSum = 0, bSum = 0;
  const n = w * h;
  for (let i = 0; i < d.length; i += 4) {
    rSum += d[i]; gSum += d[i+1]; bSum += d[i+2];
  }
  const avg = (rSum + gSum + bSum) / (n * 3);
  const rS = avg / (rSum / n);
  const gS = avg / (gSum / n);
  const bS = avg / (bSum / n);

  const out = new Uint8ClampedArray(d);
  for (let i = 0; i < d.length; i += 4) {
    out[i]   = Math.min(255, Math.round(d[i]   * rS));
    out[i+1] = Math.min(255, Math.round(d[i+1] * gS));
    out[i+2] = Math.min(255, Math.round(d[i+2] * bS));
  }
  return out;
}

// ── Contrast stretch — clips tails of each channel's histogram ──
function contrastStretch(d, w, h, clipPct = 1.0) {
  const out = new Uint8ClampedArray(d);
  const total = w * h;
  const clip = Math.round(total * clipPct / 100);

  for (let ch = 0; ch < 3; ch++) {
    const hist = new Int32Array(256);
    for (let i = ch; i < d.length; i += 4) hist[d[i]]++;

    let lo = 0, hi = 255, acc = 0;
    for (let v = 0; v < 256; v++) { acc += hist[v]; if (acc > clip) { lo = v; break; } }
    acc = 0;
    for (let v = 255; v >= 0; v--) { acc += hist[v]; if (acc > clip) { hi = v; break; } }
    if (hi <= lo) continue;

    const scale = 255 / (hi - lo);
    for (let i = ch; i < d.length; i += 4) {
      out[i] = Math.min(255, Math.max(0, Math.round((d[i] - lo) * scale)));
    }
  }
  return out;
}

// ── Unsharp mask ──
// strength: 0 = none, 1 = full sharpen
function unsharpMask(d, w, h, strength = 0.4) {
  const out = new Uint8ClampedArray(d);
  const c = 1 + strength * 8;
  const s = -strength;
  // 3×3 sharpen kernel scaled by strength
  const k = [s, s, s, s, c, s, s, s, s];

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = (y * w + x) * 4;
      for (let ch = 0; ch < 3; ch++) {
        let sum = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            sum += d[((y+ky)*w+(x+kx))*4+ch] * k[(ky+1)*3+(kx+1)];
          }
        }
        out[idx+ch] = Math.min(255, Math.max(0, Math.round(sum)));
      }
    }
  }
  return out;
}

// ── Gamma correction via LUT ──
function gammaCorrect(d, gamma) {
  const lut = new Uint8ClampedArray(256);
  for (let i = 0; i < 256; i++) lut[i] = Math.round(Math.pow(i / 255, gamma) * 255);
  const out = new Uint8ClampedArray(d);
  for (let i = 0; i < d.length; i += 4) {
    out[i] = lut[d[i]]; out[i+1] = lut[d[i+1]]; out[i+2] = lut[d[i+2]]; out[i+3] = d[i+3];
  }
  return out;
}

// ═══════════════════════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════════════════════
function addScan(dataUrl) {
  scanCount++;
  scans.push({ dataUrl, ts: Date.now() });
  document.getElementById('scan-count').textContent = scanCount;
  // Brief gallery flash
  const badge = document.querySelector('.count-badge');
  badge.style.borderColor = 'var(--success)';
  setTimeout(() => badge.style.borderColor = '', 600);
}

function showGallery() {
  renderGallery();
  showScreen('gallery-screen');
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (scans.length === 0) {
    grid.innerHTML = '<div class="empty-state">No scans yet.<br>Drop a photo in the rig<br>to get started.</div>';
    return;
  }
  grid.innerHTML = scans.map((s, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${s.dataUrl}" loading="lazy">
      <span class="item-num">#${String(i+1).padStart(3,'0')}</span>
      <span class="item-dl" onclick="event.stopPropagation(); downloadSingle(${i})">↓</span>
    </div>
  `).join('');
}

function openLightbox(idx) {
  lightboxIdx = idx;
  document.getElementById('lb-img').src = scans[idx].dataUrl;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}
function downloadLightbox() {
  if (lightboxIdx >= 0) downloadSingle(lightboxIdx);
}

function downloadSingle(idx) {
  const a = document.createElement('a');
  a.href = scans[idx].dataUrl;
  a.download = `scan-${String(idx+1).padStart(3,'0')}.jpg`;
  a.click();
}

function downloadAll() {
  scans.forEach((s, i) => {
    setTimeout(() => downloadSingle(i), i * 200);
  });
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('hidden', s.id !== id);
  });
}
function showCamera() { showScreen('camera'); }
function goBack() {
  stopCamera();
  showScreen('setup');
}

// ═══════════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════════
function setStatus(state, label) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  txt.textContent = label;
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast').classList.add('show');
}
function hideToast() {
  toastTimer = setTimeout(() => {
    document.getElementById('toast').classList.remove('show');
  }, 600);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('resize', positionZone);
</script>
